<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Prize Path Challenge</title>
    <style>
        /* CORE STYLES */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 10px;
            background-color: #111111;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        /* IMMERSIVE FULL-SCREEN MODE */
        .fullscreen-mode {
            background-color: #000000 !important;
            padding-top: 0 !important;
        }

        #main-wrapper {
            width: 95%; 
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 auto; 
            overflow: hidden; 
            z-index: 100; 
            transition: all 0.3s ease;
        }
        
        .maximized-game {
            position: fixed !important;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important;
            background-color: #111111;
            display: flex;
            justify-content: center; 
            align-items: center; 
            z-index: 1000;
            max-width: min(90vw, 500px) !important; 
            max-height: min(90vh, 800px) !important; 
        }

        .maximized-game h1 { display: none; }

        #game-container {
            width: 100%;
            border: 8px solid #ff69b4;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.7);
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas { display: block; background-color: #333333; }
        
        .control-buttons { margin-top: 15px; }
        .control-buttons button {
            background-color: #ff69b4;
            color: #111111;
            border: none;
            padding: 12px 24px; 
            margin: 5px; 
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        #mobile-controls {
            display: grid;
            grid-template-areas: ". up ." "left center right" ". down .";
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            width: 180px; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>
    
    <div id="main-wrapper">
        <h1>The PRIZE PATH Game!</h1>
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="mobile-controls">
            <button id="up-btn" style="grid-area: up;">↑</button>
            <button id="left-btn" style="grid-area: left;">←</button>
            <div style="grid-area: center;"></div>
            <button id="right-btn" style="grid-area: right;">→</button>
            <button id="down-btn" style="grid-area: down;">↓</button>
        </div>

        <div class="control-buttons">
            <button id="start-button">Start Game</button>
            <button id="maximize-button">Maximize</button>
        </div>
    </div>

    <script>
        const mainWrapper = document.getElementById('main-wrapper');
        const maximizeButton = document.getElementById('maximize-button');
        
        // NATIVE FULL-SCREEN INTEGRATION
        function toggleMaximize() {
            if (!document.fullscreenElement) {
                mainWrapper.requestFullscreen().catch(err => fallbackMaximize());
            } else {
                document.exitFullscreen();
            }
        }

        function fallbackMaximize() {
            const isMaximized = mainWrapper.classList.toggle('maximized-game');
            maximizeButton.textContent = isMaximized ? 'Exit Full Screen' : 'Maximize';
            document.body.style.overflow = isMaximized ? 'hidden' : 'auto';
        }

        document.addEventListener("fullscreenchange", () => {
            const isFS = !!document.fullscreenElement;
            mainWrapper.classList.toggle('maximized-game', isFS);
            document.body.classList.toggle('fullscreen-mode', isFS);
            maximizeButton.textContent = isFS ? 'Exit Full Screen' : 'Maximize';
        });

        maximizeButton.addEventListener('click', toggleMaximize);
        
        // --- Add your existing game logic here ---
    </script>
</body>
</html>
