<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Prize Path Challenge</title>
    <style>
        /* CORE STYLES */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 10px;
            background-color: #111111;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            transition: background-color 0.3s ease;
            touch-action: none; /* Prevents pull-to-refresh on mobile */
        }

        /* IMMERSIVE FULL-SCREEN MODE */
        .fullscreen-mode {
            background-color: #000000 !important;
            padding-top: 0 !important;
        }

        #main-wrapper {
            width: 95%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 auto; 
            overflow: hidden; 
            z-index: 100; 
            transition: all 0.3s ease;
        }
        
        /* --- MAXIMIZED VIEW STATE (Fullscreen effect) --- */
        .maximized-game {
            position: fixed !important;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important; /* Fallback */
            height: 100dvh !important; /* MOBILE FIX 2: Dynamic Viewport Height for iOS Safari */
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center; 
            z-index: 1000;
            max-width: 100vw !important; 
            max-height: 100dvh !important; 
        }

        .maximized-game h1 { display: none; }

        .maximized-game #game-container {
            flex-grow: 0;
            margin: 10px;
            max-width: 95%;
            max-height: 95%;
        }

        /* Game Board (Canvas) Styling */
        #game-container {
            width: 100%;
            border: 8px solid #ff69b4;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.7);
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: border-color 0.1s ease-out, box-shadow 0.1s ease-out;
        }

        canvas { display: block; background-color: #333333; }
        
        #game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 0;
            font-size: 1.2em;
        }
        
        /* --- General Button Styling --- */
        .control-buttons { margin-top: 15px; }
        .control-buttons button, #mobile-controls button, #message-box button {
            background-color: #ff69b4;
            color: #111111;
            border: none;
            padding: 12px 24px; 
            margin: 5px; 
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background-color 0.1s ease-out;
        }
        
        .button-active {
            background-color: white !important;
            color: #ff69b4 !important;
        }

        /* --- Mobile D-Pad Styling --- */
        #mobile-controls {
            display: grid;
            grid-template-areas: ". up ." "left center right" ". down .";
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            width: 180px; 
            margin-top: 20px;
        }
        #mobile-controls button {
            width: 100%;
            height: 40px;
            padding: 0;
            margin: 0;
            font-size: 1.1em; 
            user-select: none; /* Prevents text highlighting on rapid mobile taps */
            -webkit-user-select: none;
        }

        /* --- MESSAGE BOX / MODAL STYLING --- */
